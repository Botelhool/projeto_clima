<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Forecast Modern</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-day">

  <div class="card" id="searchCard">
    <h1>Previsão do Tempo</h1>
    <div class="form-row">
      <input type="text" id="cityInput" placeholder="Ex: Rio de Janeiro" autocomplete="off" />
      <button id="searchBtn" onclick="handleSearch()">Buscar</button>
    </div>
    <div class="error-box hidden" id="errorBox"></div>
  </div>

  <div class="card result-card hidden" id="resultCard">
    <p class="date-time" id="dateTime"></p>

    <i class="wi weather-icon" id="weatherIcon"></i>

    <div class="temp-box">
      <span id="tempValue">--</span><span class="degree">°C</span>
    </div>

    <p class="weather-desc" id="weatherDesc">--</p>

    <p class="city-name" id="cityName">--</p>

    <button class="home-btn" onclick="goHome()" title="Nova busca">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
      </svg>
    </button>
  </div>

  <script src="api.js"></script>
</body>
</html>
