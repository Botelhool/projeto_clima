<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
  script-src 'self'; 
  connect-src https://geocoding-api.open-meteo.com https://api.open-meteo.com; 
  style-src 'self' https://cdnjs.cloudflare.com; 
  font-src https://cdnjs.cloudflare.com;">
  <title>Previsão do Tempo</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css" />

</head>
<body class="theme-day">

  <!-- ── Card de Busca ── -->
  <div class="card" id="searchCard">
    <div class="search-header">
      <svg class="search-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" fill="#e3f2fd"/>
        <path d="M14 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="24" cy="18" r="3" fill="#ffca28"/>
        <path d="M10 32h28" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 36h32" stroke="#bbdefb" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h1>Previsão do Tempo</h1>
      <p class="search-subtitle">Pesquise qualquer cidade do mundo</p>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="cityInput" placeholder="Ex: Rio de Janeiro" autocomplete="off" />
      </div>
      <button id="searchBtn" onclick="handleSearch()">Buscar</button>
    </div>

    <div class="error-box hidden" id="errorBox"></div>
  </div>

  <!-- ── Card de Resultado ── -->
  <div class="card result-card hidden" id="resultCard">

    <!-- Botão voltar -->
    <button class="home-btn" onclick="goHome()" title="Nova busca">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Nova busca
    </button>

    <!-- Destaque: ícone + temperatura máx/mín -->
    <div class="current-highlight">
      <i class="wi weather-icon" id="weatherIcon"></i>
      <div class="temp-display">
        <span class="temp-max" id="tempMax">--°</span>
        <span class="temp-separator">/</span>
        <span class="temp-min" id="tempMin">--°</span>
      </div>
    </div>

    <!-- Informações de localização -->
    <div class="location-info">
      <h2 class="city-name" id="cityName">--</h2>
      <p class="country-name" id="countryName">--</p>
      <p class="weather-desc" id="weatherDesc">--</p>
      <p class="date-time" id="dateTime">--</p>
    </div>

    <!-- Divisor -->
    <div class="section-divider">
      <span>Próximos Dias</span>
    </div>

    <!-- Lista de previsão dos 5 dias -->
    <div class="forecast-list" id="forecastList">
      <!-- Linhas geradas dinamicamente via api.js -->
    </div>

  </div>
  
  <footer class="legal-footer">
  <div class="legal-content">
    <p>© 2026 Leonardo - Licença MIT</p>
    <p>Dados meteorológicos por <a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a> (CC BY 4.0)</p>
    <p>Ícones por <a href="https://erikflowers.github.io/weather-icons/" target="_blank">Weather Icons</a></p>
    <div class="legal-links">
      <a href="LICENSE" target="_blank">Licença</a> | 
      <a href="NOTICE.md" target="_blank">Atribuições</a>
    </div>
  </div>
</footer>

  <script src="api.js"></script>
</body>
</html>
